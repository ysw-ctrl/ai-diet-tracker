<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 減脂日記</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        <!-- Header -->
        <header class="p-6 border-b border-gray-100 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-900">今日紀錄</h1>
            <span class="text-sm text-gray-500">2026/07/13</span>
        </header>

        <!-- 熱量總覽 -->
        <div class="p-6 space-y-4">
            <div class="bg-green-50 rounded-2xl p-5 border border-green-100">
                <p class="text-sm text-green-700 font-medium mb-1">今日可消耗熱量赤字</p>
                <div class="flex items-end gap-2">
                    <span class="text-3xl font-bold text-green-600">350</span>
                    <span class="text-sm text-green-600 mb-1">kcal</span>
                </div>
                <div class="w-full bg-green-200 rounded-full h-2 mt-3">
                    <div class="bg-green-500 h-2 rounded-full" style="width: 70%"></div>
                </div>
            </div>

            <!-- 兩大核心按鈕 -->
            <div class="grid grid-cols-2 gap-4">
                <!-- 加入隱藏的相機上傳元件 -->
<input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">

<!-- 修改後的按鈕，加入 onclick 事件來觸發相機 -->
<button onclick="document.getElementById('cameraInput').click()" class="flex flex-col items-center justify-center p-4 bg-white border border-gray-200 rounded-2xl shadow-sm hover:bg-gray-50 transition">
    <span class="text-2xl mb-2">📸</span>
    <span class="text-sm font-medium">拍餐點</span>
</button>
                <button class="flex flex-col items-center justify-center p-4 bg-white border border-gray-200 rounded-2xl shadow-sm hover:bg-gray-50 transition">
                    <span class="text-2xl mb-2">🏃‍♂️</span>
                    <span class="text-sm font-medium">記運動</span>
                </button>
                <!-- 照片預覽與 AI 分析區塊 (預設隱藏) -->
<div id="previewContainer" class="hidden mt-6 p-4 border border-gray-200 rounded-2xl bg-white shadow-sm">
    <h3 class="text-sm font-bold text-gray-700 mb-2">餐點分析中</h3>
    <img id="imagePreview" class="w-full rounded-xl shadow-sm mb-3 object-cover max-h-64" src="" alt="餐點預覽">
    
    <!-- 模擬載入中的動畫 -->
    <div id="aiLoading" class="text-sm text-gray-500 text-center animate-pulse py-2">
        🧠 AI 營養師正在分析食物種類與份量... ⏳
    </div>
    
    <!-- AI 分析結果 (預設隱藏) -->
    <div id="aiResult" class="hidden bg-green-50 text-green-800 p-3 rounded-xl text-sm border border-green-100">
        <!-- 結果會透過 JavaScript 塞入這裡 -->
    </div>
</div>
            </div>
        </div>

        <!-- 體態折線圖 -->
        <div class="p-6 border-t border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-800">體態趨勢</h2>
                <button class="text-xs bg-gray-100 px-3 py-1 rounded-full">+ 紀錄今日體重</button>
            </div>
            <div class="relative h-48 w-full">
                <canvas id="bodyChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Chart.js 設定 -->
    <script>
        const ctx = document.getElementById('bodyChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['7/7', '7/8', '7/9', '7/10', '7/11', '7/12', '7/13'],
                datasets: [
                    {
                        label: '體重 (kg)',
                        data: [70.5, 70.3, 70.0, 70.2, 69.8, 69.5, 69.2],
                        borderColor: '#3B82F6', // 藍色
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        yAxisID: 'y',
                        tension: 0.4,
                        fill: true
                    },
                    {
                        label: '體脂 (%)',
                        data: [22.5, 22.4, 22.4, 22.3, 22.1, 22.0, 21.8],
                        borderColor: '#F59E0B', // 橘色
                        borderDash: [5, 5],
                        yAxisID: 'y1',
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { type: 'linear', display: true, position: 'left', title: {display: true, text: 'kg'} },
                    y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, title: {display: true, text: '%'} }
                },
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } }
            }
        });
    </script>
</body>
</html>
