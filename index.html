<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 體態日記 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg pb-10">
        <!-- Header -->
        <header class="p-6 border-b border-gray-100 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-900">今日紀錄</h1>
            <span id="currentDateLabel" class="text-sm text-gray-500">2026/07/13</span>
        </header>

        <div class="p-6 space-y-6">
            <!-- 熱量總覽 (改為剩餘熱量倒數) -->
            <div class="bg-blue-50 rounded-2xl p-5 border border-blue-100">
                <div class="flex justify-between items-start mb-1">
                    <p class="text-sm text-blue-700 font-medium">今日剩餘所需熱量</p>
                    <span id="calorieInfo" class="text-[10px] text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full">動態計算中</span>
                </div>
                <div class="flex items-end gap-2">
                    <span id="remainingCalories" class="text-3xl font-bold text-blue-600">--</span>
                    <span class="text-sm text-blue-600 mb-1">kcal</span>
                </div>
            </div>

            <!-- 核心功能按鈕 -->
            <div class="grid grid-cols-2 gap-4">
                <input type="file" id="cameraInput" accept="image/*" class="hidden">
                <button onclick="document.getElementById('cameraInput').click()" class="flex flex-col items-center justify-center p-4 bg-white border border-gray-200 rounded-2xl shadow-sm hover:bg-gray-50 transition">
                    <span class="text-2xl mb-2">📸</span>
                    <span class="text-sm font-medium">拍照 / 相簿</span>
                </button>
                <button onclick="recordExerciseAI()" class="flex flex-col items-center justify-center p-4 bg-white border border-gray-200 rounded-2xl shadow-sm hover:bg-gray-50 transition">
                    <span class="text-2xl mb-2">🏃‍♂️</span>
                    <span class="text-sm font-medium">智慧記運動</span>
                </button>
            </div>

            <!-- 餐點文字輸入與修改區 -->
            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-200">
                <label class="text-xs font-bold text-gray-500 block mb-2">🍽️ 手動輸入或修改餐點敘述：</label>
                <div class="flex gap-2">
                    <input type="text" id="foodTextInput" placeholder="例如：吃了兩顆水煮蛋和一杯黑咖啡" class="flex-1 text-sm border border-gray-300 rounded-xl px-3 py-2 focus:outline-none focus:border-blue-500">
                    <button onclick="analyzeTextFood()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-xl transition">分析</button>
                </div>
            </div>

            <!-- 照片預覽與 AI 分析區塊 -->
            <div id="previewContainer" class="hidden p-4 border border-gray-200 rounded-2xl bg-white shadow-sm">
                <h3 class="text-sm font-bold text-gray-700 mb-2">餐點分析中</h3>
                <img id="imagePreview" class="w-full rounded-xl shadow-sm mb-3 object-cover max-h-64 hidden" src="" alt="餐點預覽">
                <div id="aiLoading" class="text-sm text-gray-500 text-center animate-pulse py-2">🧠 AI 正在計算熱量... ⏳</div>
                <div id="aiResult" class="hidden bg-blue-50 text-blue-800 p-3 rounded-xl text-sm border border-blue-100"></div>
            </div>

            <!-- AI 營養師建議區塊 -->
            <div class="bg-gradient-to-r from-emerald-50 to-teal-50 border border-emerald-100 rounded-2xl p-4">
                <div class="flex justify-between items-center mb-1">
                    <h3 class="text-sm font-bold text-emerald-800">💡 AI 營養師碎碎念</h3>
                    <button onclick="getAIAdvice()" class="text-xs text-emerald-600 hover:underline">獲取新建議</button>
                </div>
                <p id="aiAdviceText" class="text-xs text-emerald-700 leading-relaxed">按下右上角，讓 AI 根據你目前的紀錄提供客製化減脂建議吧！</p>
            </div>

            <!-- 最近 10 筆紀錄欄 -->
            <div class="border border-gray-200 rounded-2xl p-4 bg-white shadow-sm">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-bold text-gray-700">📋 最近動態紀錄 (最近 10 筆)</h3>
                    <!-- 新增：刪除上一筆按鈕 -->
                    <button onclick="deleteLastLog()" class="text-[10px] bg-red-50 text-red-600 hover:bg-red-100 font-medium px-2.5 py-1 rounded-full transition">↩️ 刪除上一筆</button>
                </div>
                <ul id="logList" class="space-y-2 max-h-60 overflow-y-auto text-xs text-gray-600">
                    <li class="text-gray-400 italic">目前尚無 any 紀錄...</li>
                </ul>
            </div>


        <!-- 體態折線圖 -->
        <div class="p-6 border-t border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-800">體態趨勢</h2>
                <button onclick="recordBodyStats()" class="text-xs bg-blue-50 text-blue-600 hover:bg-blue-100 font-medium px-3 py-1 rounded-full transition">+ 紀錄體重/體脂</button>
            </div>
            <div class="relative h-48 w-full">
                <canvas id="bodyChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // 自動顯示當前日期
        const today = new Date();
        const dateString = `${today.getFullYear()}/${(today.getMonth()+1)}/${today.getDate()}`;
        document.getElementById('currentDateLabel').innerText = dateString;

        // --- 核心資料持久化設定 ---
        
        // 1. 歷史動態文字紀錄
        let recentLogs = JSON.parse(localStorage.getItem('diet_logs')) || [];

        // 2. 體態折線圖數據歷史
        const defaultBodyHistory = {
            labels: ['7/7', '7/8', '7/9', '7/10', '7/11', '7/12', '今日'],
            weights: [70.5, 70.3, 70.0, 70.2, 69.8, 69.5, 69.0],
            fats: [22.5, 22.4, 22.4, 22.3, 22.1, 22.0, 21.5]
        };
        let bodyHistory = JSON.parse(localStorage.getItem('body_history')) || defaultBodyHistory;

        // 3. 熱量目標倒數管理機制 (取代原本的赤字)
        function getLatestWeight() {
            if (bodyHistory.weights && bodyHistory.weights.length > 0) {
                return bodyHistory.weights[bodyHistory.weights.length - 1];
            }
            return 70;
        }

        let currentWeight = getLatestWeight();
        // 動態公式：基礎所需目標 = 當前體重 * 30 (取代原本的 *7 赤字算法)
        let baseTargetCalories = Math.round(currentWeight * 30);

        // 新增：跨日自動重置機制（檢查是否為新的一天）
        const lastSavedDate = localStorage.getItem('last_saved_date');
        if (lastSavedDate !== dateString) {
            localStorage.setItem('today_exercise_cals', 0);
            localStorage.setItem('today_food_cals', 0);
            localStorage.setItem('last_saved_date', dateString);
        }

        // 從本地讀取今日的運動增加與飲食消耗
        let savedExerciseCals = parseInt(localStorage.getItem('today_exercise_cals')) || 0;
        let savedFoodCals = parseInt(localStorage.getItem('today_food_cals')) || 0;
        
        // 更新上方熱量大數字顯示 (倒數機制)
        function refreshCalorieUI() {
            // 公式：剩餘所需 = 基礎目標 + 運動消耗額外需求 - 已進食補充
            const remaining = baseTargetCalories + savedExerciseCals - savedFoodCals;
            document.getElementById('remainingCalories').innerText = remaining;
            document.getElementById('calorieInfo').innerText = `目標 ${baseTargetCalories} + 運動 ${savedExerciseCals} - 飲食 ${savedFoodCals}`;
        }

        // --- 初始化 Chart.js 雙軸折線圖 ---
        const ctx = document.getElementById('bodyChart').getContext('2d');
        const bodyChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: bodyHistory.labels,
                datasets: [
                    { label: '體重 (kg)', data: bodyHistory.weights, borderColor: '#3B82F6', backgroundColor: 'rgba(59, 130, 246, 0.1)', yAxisID: 'y', tension: 0.4, fill: true },
                    { label: '體脂 (%)', data: bodyHistory.fats, borderColor: '#F59E0B', borderDash: [5, 5], yAxisID: 'y1', tension: 0.4 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { type: 'linear', display: true, position: 'left', title: {display: true, text: 'kg'} },
                    y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, title: {display: true, text: '%'} }
                },
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } }
            }
        });

        // --- 互動功能函式 ---

        // 更新文字動態紀錄 UI
        function updateLogUI() {
            const logList = document.getElementById('logList');
            if (recentLogs.length === 0) {
                logList.innerHTML = `<li class="text-gray-400 italic">目前尚無任何紀錄...</li>`;
                return;
            }
            logList.innerHTML = recentLogs.map(log => `
                <li class="flex justify-between items-start border-b border-gray-50 pb-1.5">
                    <span class="font-medium text-gray-700">${log.content}</span>
                    <span class="text-[10px] text-gray-400 shrink-0 ml-2">${log.time}</span>
                </li>
            `).join('');
            localStorage.setItem('diet_logs', JSON.stringify(recentLogs));
        }
        
function addLog(content) {
            const now = new Date();
            const dateStr = `${now.getFullYear()}/${(now.getMonth()+1)}/${now.getDate()}`; // 【新增】取得當前日期
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            recentLogs.unshift({ content, time: timeStr, date: dateStr }); // 【修改】將日期一同存入日誌對象中
            if (recentLogs.length > 10) recentLogs.pop();
            updateLogUI();
        }

        // 紀錄體重與體脂
        function recordBodyStats() {
            const weight = prompt(`請輸入今日體重 (kg)，目前基礎公式依此計算：`, currentWeight);
            if (weight && !isNaN(weight)) {
                const fat = prompt("請輸入今日體脂 (%)：");
                if (fat && !isNaN(fat)) {
                    const now = new Date();
                    const dateStr = `${now.getMonth()+1}/${now.getDate()}`;
                    
                    bodyHistory.labels.push(dateStr);
                    bodyHistory.weights.push(parseFloat(weight));
                    bodyHistory.fats.push(parseFloat(fat));
                    
                    if (bodyHistory.labels.length > 12) {
                        bodyHistory.labels.shift();
                        bodyHistory.weights.shift();
                        bodyHistory.fats.shift();
                    }
                    
                    localStorage.setItem('body_history', JSON.stringify(bodyHistory));
                    
                    bodyChart.data.labels = bodyHistory.labels;
                    bodyChart.data.datasets[0].data = bodyHistory.weights;
                    bodyChart.data.datasets[1].data = bodyHistory.fats;
                    bodyChart.update();
                    
                    // 重新動態校正熱量目標核心
                    currentWeight = parseFloat(weight);
                    baseTargetCalories = Math.round(currentWeight * 30);
                    refreshCalorieUI();
                    
                    addLog(`📈 紀錄體態：${weight} kg / ${fat} % (目標已依體重調整)`);
                }
            }
        }

        // 智慧運動轉換（累加運動增加的需求至 LocalStorage）
        async function recordExerciseAI() {
            const desc = prompt("請描述你今天的運動（例如：我今天跑步了60分鐘，10km）：");
            if (!desc) return;

            alert("🧠 AI 正在精算該運動消耗的熱量，請稍候...");

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'exercise', textContent: desc })
                });
                const data = await response.json();
                
                const burnedCals = parseInt(data.result.replace(/[^0-9]/g, ''));
                
                if (!isNaN(burnedCals) && burnedCals > 0) {
                    savedExerciseCals += burnedCals;
                    localStorage.setItem('today_exercise_cals', savedExerciseCals);
                    
                    refreshCalorieUI();
                    addLog(`🏃‍♂️ ${desc} (增加額外需求：${burnedCals} kcal)`);
                    alert(`✅ 成功！AI 判定此運動消耗了 ${burnedCals} kcal，已加計入今日總需熱量！`);
                } else {
                    alert("AI 無法精準估算卡路里，請敘述得更具體一點（包含時間或強度）。");
                }
            } catch (error) {
                alert("網路連線失敗，請重試。");
            }
        }

        // 用文字分析餐點
        async function analyzeTextFood() {
            const text = document.getElementById('foodTextInput').value;
            if (!text) return alert("請先輸入餐點描述文字喔！");

            const previewContainer = document.getElementById('previewContainer');
            const imagePreview = document.getElementById('imagePreview');
            const aiLoading = document.getElementById('aiLoading');
            const aiResult = document.getElementById('aiResult');

            previewContainer.classList.remove('hidden');
            imagePreview.classList.add('hidden');
            aiLoading.classList.remove('hidden');
            aiResult.classList.add('hidden');

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'text_food', textContent: text })
                });
                const data = await response.json();
                showMealResult(data, `🍽️ 文字輸入：${text}`);
            } catch (error) {
                showMealError();
            }
        }

        // 處理相簿或相機照片上傳
        document.getElementById('cameraInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const previewContainer = document.getElementById('previewContainer');
            const imagePreview = document.getElementById('imagePreview');
            const aiLoading = document.getElementById('aiLoading');
            const aiResult = document.getElementById('aiResult');

            previewContainer.classList.remove('hidden');
            imagePreview.classList.remove('hidden');
            aiLoading.classList.remove('hidden');
            aiResult.classList.add('hidden');
            imagePreview.src = URL.createObjectURL(file);

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async function () {
                const base64String = reader.result.split(',')[1]; 
                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ type: 'image', imageBase64: base64String })
                    });
                    const data = await response.json();
                    showMealResult(data, `📸 照片分析餐點`);
                } catch (error) {
                    showMealError();
                }
            };
        });

        function showMealResult(data, logTitle) {
            const aiLoading = document.getElementById('aiLoading');
            const aiResult = document.getElementById('aiResult');
            aiLoading.classList.add('hidden');
            aiResult.classList.remove('hidden');

            if (data.result) {
                document.getElementById('foodTextInput').value = data.result.replace(/\n/g, ' ');
                const formattedText = data.result.replace(/\n/g, '<br>');
                aiResult.innerHTML = `
                    <p class="font-bold mb-1">🍽️ 分析結果：</p>
                    <div class="text-gray-700 mb-2">${formattedText}</div>
                    <button class="w-full bg-blue-500 text-white py-1 rounded-lg text-xs" onclick="confirmMealLog('${logTitle}', this)">
                        確認寫入並扣除剩餘熱量
                    </button>
                `;
            } else {
                aiResult.innerHTML = `<p class="text-red-500">分析失敗：${data.error}</p>`;
            }
        }

        function confirmMealLog(title, btn) {
            // 加入簡易的熱量扣除機制
            const cals = prompt("請輸入此餐點的熱量 (kcal) 以扣除剩餘所需：", "0");
            const parsedCals = parseInt(cals);
            
            if (!isNaN(parsedCals) && parsedCals >= 0) {
                savedFoodCals += parsedCals;
                localStorage.setItem('today_food_cals', savedFoodCals);
                
                refreshCalorieUI();
                addLog(`${title} (補充：${parsedCals} kcal)`);
                
                btn.innerText = '已記錄並扣除！';
                btn.disabled = true;
                btn.classList.add('bg-gray-400');
            } else {
                alert("請輸入正確的數字格式！");
            }
        }

        function showMealError() {
            document.getElementById('aiLoading').classList.add('hidden');
            document.getElementById('aiResult').classList.remove('hidden');
            document.getElementById('aiResult').innerHTML = `<p class="text-red-500">網路錯誤，請重試。</p>`;
        }

// 獲取 AI 營養師建議
        async function getAIAdvice() {
            const adviceText = document.getElementById('aiAdviceText');
            adviceText.innerText = "🧠 營養師正在看你的紀錄，請稍候...";

            // 【修改】只篩選出與今天日期（dateString）相符的紀錄傳送給 AI
            const todayLogs = recentLogs.filter(l => l.date === dateString);
            const logsSummary = todayLogs.length > 0 
                ? `今天是 ${dateString}。今日紀錄如下：` + todayLogs.map(l => `[${l.time}] ${l.content}`).join(', ') 
                : `今天是 ${dateString}。今日目前沒有任何飲食與運動紀錄`;

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'advice', logsSummary: logsSummary })
                });
                const data = await response.json();
                adviceText.innerText = data.result || "今天也要繼續加油喔！";
            } catch (error) {
                adviceText.innerText = "連線失敗，營養師去喝水了 nudge，晚點再試！";
            }
        }
        // 新增功能：刪除最近一筆紀錄並自動還原熱量
        function deleteLastLog() {
            if (recentLogs.length === 0) {
                alert("目前沒有任何紀錄可以刪除！");
                return;
            }

            const lastLog = recentLogs[0];
            const confirmDelete = confirm(`確定要刪除最近一筆紀錄嗎？\n\n「${lastLog.content}」`);
            if (!confirmDelete) return;

            // 智慧還原機制：利用正則表達式自動偵測日誌中的卡路里並扣除
            const foodMatch = lastLog.content.match(/\(補充：(\d+)\s*kcal\)/);
            const exerciseMatch = lastLog.content.match(/\(增加額外需求：(\d+)\s*kcal\)/);

            if (foodMatch) {
                const cals = parseInt(foodMatch[1]);
                savedFoodCals = Math.max(0, savedFoodCals - cals);
                localStorage.setItem('today_food_cals', savedFoodCals);
            } else if (exerciseMatch) {
                const cals = parseInt(exerciseMatch[1]);
                savedExerciseCals = Math.max(0, savedExerciseCals - cals);
                localStorage.setItem('today_exercise_cals', savedExerciseCals);
            }

            // 移除最上方（最新）的一筆紀錄
            recentLogs.shift();
            
            // 儲存至本地並同步更新 UI
            localStorage.setItem('diet_logs', JSON.stringify(recentLogs));
            updateLogUI();
            refreshCalorieUI();
        }

        // 頁面初始化載入
        updateLogUI();
        refreshCalorieUI();
    </script>
</body>
</html>
