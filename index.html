<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 減脂日記 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg pb-10">
        <!-- Header -->
        <header class="p-6 border-b border-gray-100 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-900">今日紀錄</h1>
            <span class="text-sm text-gray-500">2026/07/13</span>
        </header>

        <div class="p-6 space-y-6">
            <!-- 熱量總覽 -->
            <div class="bg-green-50 rounded-2xl p-5 border border-green-100">
                <p class="text-sm text-green-700 font-medium mb-1">今日可消耗熱量赤字</p>
                <div class="flex items-end gap-2">
                    <span id="calorieDeficit" class="text-3xl font-bold text-green-600">350</span>
                    <span class="text-sm text-green-600 mb-1">kcal</span>
                </div>
            </div>

            <!-- 核心功能按鈕 -->
            <div class="grid grid-cols-2 gap-4">
                <!-- 移除了 capture="environment"，現在會同時支援相機與相簿 -->
                <input type="file" id="cameraInput" accept="image/*" class="hidden">
                <button onclick="document.getElementById('cameraInput').click()" class="flex flex-col items-center justify-center p-4 bg-white border border-gray-200 rounded-2xl shadow-sm hover:bg-gray-50 transition">
                    <span class="text-2xl mb-2">📸</span>
                    <span class="text-sm font-medium">拍照 / 相簿</span>
                </button>
                <button onclick="recordExerciseAI()" class="flex flex-col items-center justify-center p-4 bg-white border border-gray-200 rounded-2xl shadow-sm hover:bg-gray-50 transition">
                    <span class="text-2xl mb-2">🏃‍♂️</span>
                    <span class="text-sm font-medium">智慧記運動</span>
                </button>
            </div>

            <!-- 餐點文字輸入與修改區 -->
            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-200">
                <label class="text-xs font-bold text-gray-500 block mb-2">🍽️ 手動輸入或修改餐點敘述：</label>
                <div class="flex gap-2">
                    <input type="text" id="foodTextInput" placeholder="例如：吃了兩顆水煮蛋和一杯黑咖啡" class="flex-1 text-sm border border-gray-300 rounded-xl px-3 py-2 focus:outline-none focus:border-green-500">
                    <button onclick="analyzeTextFood()" class="bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-xl transition">分析</button>
                </div>
            </div>

            <!-- 照片預覽與 AI 分析區塊 -->
            <div id="previewContainer" class="hidden p-4 border border-gray-200 rounded-2xl bg-white shadow-sm">
                <h3 class="text-sm font-bold text-gray-700 mb-2">餐點分析中</h3>
                <img id="imagePreview" class="w-full rounded-xl shadow-sm mb-3 object-cover max-h-64 hidden" src="" alt="餐點預覽">
                <div id="aiLoading" class="text-sm text-gray-500 text-center animate-pulse py-2">🧠 AI 正在計算熱量... ⏳</div>
                <div id="aiResult" class="hidden bg-green-50 text-green-800 p-3 rounded-xl text-sm border border-green-100"></div>
            </div>

            <!-- AI 營養師建議區塊 -->
            <div class="bg-gradient-to-r from-emerald-50 to-teal-50 border border-emerald-100 rounded-2xl p-4">
                <div class="flex justify-between items-center mb-1">
                    <h3 class="text-sm font-bold text-emerald-800">💡 AI 營養師碎碎念</h3>
                    <button onclick="getAIAdvice()" class="text-xs text-emerald-600 hover:underline">獲取新建議</button>
                </div>
                <p id="aiAdviceText" class="text-xs text-emerald-700 leading-relaxed">按下右上角，讓 AI 根據你目前的紀錄提供客製化減脂建議吧！</p>
            </div>

            <!-- 最近 10 筆紀錄欄 -->
            <div class="border border-gray-200 rounded-2xl p-4 bg-white shadow-sm">
                <h3 class="text-sm font-bold text-gray-700 mb-3">📋 最近動態紀錄 (最近 10 筆)</h3>
                <ul id="logList" class="space-y-2 max-h-60 overflow-y-auto text-xs text-gray-600">
                    <li class="text-gray-400 italic">目前尚無任何紀錄...</li>
                </ul>
            </div>
        </div>

        <!-- 體態折線圖 -->
        <div class="p-6 border-t border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-800">體態趨勢</h2>
                <button onclick="recordBodyStats()" class="text-xs bg-blue-50 text-blue-600 hover:bg-blue-100 font-medium px-3 py-1 rounded-full transition">+ 紀錄體重/體脂</button>
            </div>
            <div class="relative h-48 w-full">
                <canvas id="bodyChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // 初始化紀錄陣列 (嘗試從本地瀏覽器讀取舊資料，若無則為空)
        let recentLogs = JSON.parse(localStorage.getItem('diet_logs')) || [];

        // 1. 初始化雙軸 Chart.js 折線圖 (體重 + 體脂)
        const ctx = document.getElementById('bodyChart').getContext('2d');
        const bodyChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['7/7', '7/8', '7/9', '7/10', '7/11', '7/12', '7/13'],
                datasets: [
                    { label: '體重 (kg)', data: [70.5, 70.3, 70.0, 70.2, 69.8, 69.5, 69.2], borderColor: '#3B82F6', backgroundColor: 'rgba(59, 130, 246, 0.1)', yAxisID: 'y', tension: 0.4, fill: true },
                    { label: '體脂 (%)', data: [22.5, 22.4, 22.4, 22.3, 22.1, 22.0, 21.8], borderColor: '#F59E0B', borderDash: [5, 5], yAxisID: 'y1', tension: 0.4 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { type: 'linear', display: true, position: 'left', title: {display: true, text: 'kg'} },
                    y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, title: {display: true, text: '%'} }
                },
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } }
            }
        });

        // 更新歷史紀錄欄 UI (限制最多10筆)
        function updateLogUI() {
            const logList = document.getElementById('logList');
            if (recentLogs.length === 0) {
                logList.innerHTML = `<li class="text-gray-400 italic">目前尚無任何紀錄...</li>`;
                return;
            }
            logList.innerHTML = recentLogs.map(log => `
                <li class="flex justify-between items-start border-b border-gray-50 pb-1.5">
                    <span class="font-medium text-gray-700">${log.content}</span>
                    <span class="text-[10px] text-gray-400 shrink-0 ml-2">${log.time}</span>
                </li>
            `).join('');
            localStorage.setItem('diet_logs', JSON.stringify(recentLogs));
        }
        
        function addLog(content) {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            recentLogs.unshift({ content, time: timeStr }); // 加到最前面
            if (recentLogs.length > 10) recentLogs.pop(); // 超過10筆就移走最舊的
            updateLogUI();
        }

        // 2. 紀錄體重與體脂
        function recordBodyStats() {
            const weight = prompt("請輸入今日體重 (kg)：");
            if (weight && !isNaN(weight)) {
                const fat = prompt("請輸入今日體脂 (%)：");
                if (fat && !isNaN(fat)) {
                    bodyChart.data.labels.push('今日');
                    bodyChart.data.datasets[0].data.push(parseFloat(weight));
                    bodyChart.data.datasets[1].data.push(parseFloat(fat));
                    bodyChart.update();
                    addLog(`📈 紀錄體態：${weight} kg / ${fat} %`);
                }
            }
        }

        // 3. 智慧運動轉換（直接輸入文字描述）
        async function recordExerciseAI() {
            const desc = prompt("請描述你今天的運動（例如：我今天跑步了60分鐘，10km）：");
            if (!desc) return;

            const deficitEl = document.getElementById('calorieDeficit');
            alert("🧠 AI 正在精算該運動消耗的熱量，請稍候...");

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'exercise', textContent: desc })
                });
                const data = await response.json();
                
                // 強制過濾非數字字元，確保安全轉為整數
                const burnedCals = parseInt(data.result.replace(/[^0-9]/g, ''));
                
                if (!isNaN(burnedCals) && burnedCals > 0) {
                    const currentDeficit = parseInt(deficitEl.innerText);
                    deficitEl.innerText = currentDeficit + burnedCals;
                    addLog(`🏃‍♂️ ${desc} (AI 估算消耗：${burnedCals} kcal)`);
                    alert(`✅ 成功！AI 判定此運動消耗了 ${burnedCals} kcal，已計入赤字！`);
                } else {
                    alert("AI 無法精準估算卡路里，請敘述得更具體一點（包含時間或強度）。");
                }
            } catch (error) {
                alert("網路連線失敗，請重試。");
            }
        }

        // 4. 用文字分析與修改餐點
        async function analyzeTextFood() {
            const text = document.getElementById('foodTextInput').value;
            if (!text) return alert("請先輸入餐點描述文字喔！");

            const previewContainer = document.getElementById('previewContainer');
            const imagePreview = document.getElementById('imagePreview');
            const aiLoading = document.getElementById('aiLoading');
            const aiResult = document.getElementById('aiResult');

            previewContainer.classList.remove('hidden');
            imagePreview.classList.add('hidden'); // 文字模式不顯示圖片
            aiLoading.classList.remove('hidden');
            aiResult.classList.add('hidden');

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'text_food', textContent: text })
                });
                const data = await response.json();
                showMealResult(data, `🍽️ 文字輸入：${text}`);
            } catch (error) {
                showMealError();
            }
        }

        // 5. 處理相簿或相機照片上傳
        document.getElementById('cameraInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const previewContainer = document.getElementById('previewContainer');
            const imagePreview = document.getElementById('imagePreview');
            const aiLoading = document.getElementById('aiLoading');
            const aiResult = document.getElementById('aiResult');

            previewContainer.classList.remove('hidden');
            imagePreview.classList.remove('hidden');
            aiLoading.classList.remove('hidden');
            aiResult.classList.add('hidden');
            imagePreview.src = URL.createObjectURL(file);

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async function () {
                const base64String = reader.result.split(',')[1]; 
                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ type: 'image', imageBase64: base64String })
                    });
                    const data = await response.json();
                    showMealResult(data, `📸 拍照/相簿分析餐點`);
                } catch (error) {
                    showMealError();
                }
            };
        });

        // 顯示餐點分析結果的輔助函式
        function showMealResult(data, logTitle) {
            const aiLoading = document.getElementById('aiLoading');
            const aiResult = document.getElementById('aiResult');
            aiLoading.classList.add('hidden');
            aiResult.classList.remove('hidden');

            if (data.result) {
                // 自動將 AI 的分析文字填入上方的修改欄，方便使用者微調
                document.getElementById('foodTextInput').value = data.result.replace(/\n/g, ' ');

                const formattedText = data.result.replace(/\n/g, '<br>');
                aiResult.innerHTML = `
                    <p class="font-bold mb-1">🍽️ 分析結果：</p>
                    <div class="text-gray-700 mb-2">${formattedText}</div>
                    <button class="w-full bg-green-500 text-white py-1 rounded-lg text-xs" onclick="confirmMealLog('${logTitle}', this)">
                        確認寫入動態紀錄欄
                    </button>
                `;
            } else {
                aiResult.innerHTML = `<p class="text-red-500">分析失敗：${data.error}</p>`;
            }
        }

        function confirmMealLog(title, btn) {
            addLog(title);
            btn.innerText = '已記錄！';
            btn.disabled = true;
            btn.classList.add('bg-gray-400');
        }

        function showMealError() {
            document.getElementById('aiLoading').classList.add('hidden');
            document.getElementById('aiResult').classList.remove('hidden');
            document.getElementById('aiResult').innerHTML = `<p class="text-red-500">網路錯誤，請重試。</p>`;
        }

        // 6. 獲取 AI 營養師建議
        async function getAIAdvice() {
            const adviceText = document.getElementById('aiAdviceText');
            adviceText.innerText = "🧠 營養師正在看你的紀錄，請稍候...";

            // 統整目前的歷史紀錄文字傳給 AI
            const logsSummary = recentLogs.length > 0 
                ? recentLogs.map(l => l.content).join(', ') 
                : "目前沒有任何飲食與運動紀錄";

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'advice', logsSummary: logsSummary })
                });
                const data = await response.json();
                adviceText.innerText = data.result || "今天也要繼續加油喔！";
            } catch (error) {
                adviceText.innerText = "連線失敗，營養師去喝水了，晚點再試！";
            }
        }

        // 頁面載入時自動刷新一次歷史紀錄
        updateLogUI();
    </script>
</body>
</html>
